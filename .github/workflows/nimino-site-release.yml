name: Nimino Site Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for example v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: nimino-site-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and publish site installers
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build pinned Docker toolchain
        run: docker compose build nimino-dev

      - name: Build site installers and checksums
        run: |
          set -eu
          docker compose run --rm nimino-dev bash -lc 'export PATH=/opt/nim/bin:$PATH; nimble testSiteRelease'
          test -s .tmp/site-release/RELEASE-NOTES.txt
          test -s .tmp/site-release/assets/SHA256SUMS
          (cd .tmp/site-release/assets && sha256sum -c SHA256SUMS)

      - name: Generate signed Popular Packages catalog
        env:
          NIMINO_POPULAR_CATALOG_SECRET_KEY: ${{ secrets.NIMINO_POPULAR_CATALOG_SECRET_KEY }}
          NIMINO_POPULAR_CATALOG_PUBLIC_KEY: ${{ secrets.NIMINO_POPULAR_CATALOG_PUBLIC_KEY }}
          NIMINO_POPULAR_CATALOG_KEY_ID: ${{ secrets.NIMINO_POPULAR_CATALOG_KEY_ID }}
        run: |
          set -euo pipefail
          test -n "$NIMINO_POPULAR_CATALOG_SECRET_KEY" || {
            echo 'NIMINO_POPULAR_CATALOG_SECRET_KEY repository secret is required' >&2
            exit 1
          }
          test -n "$NIMINO_POPULAR_CATALOG_PUBLIC_KEY" || {
            echo 'NIMINO_POPULAR_CATALOG_PUBLIC_KEY repository secret is required' >&2
            exit 1
          }
          test -n "$NIMINO_POPULAR_CATALOG_KEY_ID" || {
            echo 'NIMINO_POPULAR_CATALOG_KEY_ID repository secret is required' >&2
            exit 1
          }
          mkdir -p .tmp/popular-catalog-signing
          printf '%s' "$NIMINO_POPULAR_CATALOG_SECRET_KEY" > .tmp/popular-catalog-signing/release.key
          printf '%s' "$NIMINO_POPULAR_CATALOG_PUBLIC_KEY" > .tmp/popular-catalog-signing/release.pub
          docker compose run --rm \
            -e CATALOG_TAG="$RELEASE_TAG" \
            -e CATALOG_COMMIT="$GITHUB_SHA" \
            -e CATALOG_RUN_ID="$GITHUB_RUN_ID" \
            -e CATALOG_KEY_ID="$NIMINO_POPULAR_CATALOG_KEY_ID" \
            nimino-dev bash -lc 'python3 tools/ci/generate_popular_catalog.py \
              --assets-dir /workspace/.tmp/site-release/assets \
              --output /workspace/.tmp/site-release/assets/popular-packages.json \
              --tag "$CATALOG_TAG" --commit "$CATALOG_COMMIT" --run-id "$CATALOG_RUN_ID" \
              --secret-key /workspace/.tmp/popular-catalog-signing/release.key \
              --key-id "$CATALOG_KEY_ID"'
          cp .tmp/popular-catalog-signing/release.pub .tmp/site-release/assets/nimino-popular-packages.pub
          rm -rf .tmp/popular-catalog-signing
          test -s .tmp/site-release/assets/popular-packages.json
          test -s .tmp/site-release/assets/nimino-popular-packages.pub

      - name: Upload build output for inspection
        uses: actions/upload-artifact@v4
        with:
          name: nimino-sites-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: .tmp/site-release/

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --title "Nimino $RELEASE_TAG" \
              --notes-file .tmp/site-release/RELEASE-NOTES.txt \
              --verify-tag
          gh release upload "$RELEASE_TAG" \
            .tmp/site-release/RELEASE-NOTES.txt \
            .tmp/site-release/assets/* --clobber
