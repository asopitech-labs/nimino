name: Nimino Prepack Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for example v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: nimino-prepack-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and publish prepack installers
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          # Tag pushes build the tagged commit. Manual dispatches build the
          # selected branch while publishing to the existing release tag.
          ref: ${{ github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build pinned Docker toolchain
        run: docker compose build nimino-dev

      - name: Build prepack installers and checksums
        run: |
          set -eu
          docker compose run --rm nimino-dev bash -lc 'export PATH=/opt/nim/bin:$PATH; nimble buildPrepackRelease'
          test -s .tmp/prepack-release/RELEASE-NOTES.txt
          test -s .tmp/prepack-release/assets/SHA256SUMS
          (cd .tmp/prepack-release/assets && sha256sum -c SHA256SUMS)

      - name: Upload build output for inspection
        uses: actions/upload-artifact@v4
        with:
          name: nimino-prepacks-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: .tmp/prepack-release/

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --title "Nimino $RELEASE_TAG" \
              --notes-file .tmp/prepack-release/RELEASE-NOTES.txt \
              --verify-tag
          gh release upload "$RELEASE_TAG" \
            .tmp/prepack-release/RELEASE-NOTES.txt \
            .tmp/prepack-release/assets/* --clobber
