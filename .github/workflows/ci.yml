name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: nimino-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  common:
    name: Common tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the development image from the repository Dockerfile
        run: docker compose build nimino-dev

      - name: Run common unit and pack checks
        run: >-
          make
          verify-env
          setup-contract-test
          test
          pack-test
          pack-cli-test
          pack-popular-catalog-test
