services:
  nimino-dev:
    build:
      context: .
      dockerfile: tools/docker/Dockerfile
      args:
        NIM_IMAGE: nimlang/nim:latest@sha256:62428daa4a39baeb6f5e429a9c2ca3cee27a80ef880fe6e1bf3e29cc2296ac1b
    image: nimino-dev:local
    working_dir: /workspace
    volumes:
      - .:/workspace
      - nimble-cache:/root/.cache/nimble
      - flatpak-cache:/var/lib/flatpak
    init: true
    tty: true

  # flatpak-builder launches bubblewrap and needs a user namespace.  Keep this
  # privilege isolated to the explicit Flatpak packaging smoke target.
  nimino-flatpak:
    extends:
      service: nimino-dev
    privileged: true

volumes:
  nimble-cache:
  flatpak-cache:
