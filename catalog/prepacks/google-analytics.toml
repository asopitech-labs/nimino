# Built-in prepack: `nimino pack prepack google-analytics`
name = "Google Analytics"
id = "com.nimino.google-analytics"
url = "https://analytics.google.com/analytics/web/"
profile = "default"

[window]
width = 1440
height = 900
resizable = true

[package]
version = "0.1.0"
description = "Google Analytics web application"
publisher = "Nimino"
homepage = "https://analytics.google.com/"
categories = ["Network"]

[navigation]
allow = ["https://analytics.google.com/**", "https://accounts.google.com/**", "https://*.google.com/**", "https://*.googleusercontent.com/**", "https://tagmanager.google.com/**"]
external = ["https://support.google.com/**"]
