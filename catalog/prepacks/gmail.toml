# Built-in prepack: `nimino pack prepack gmail`
name = "Gmail"
id = "com.nimino.gmail"
url = "https://mail.google.com/mail/u/0/"
profile = "default"

[window]
width = 1280
height = 900
resizable = true

[package]
version = "0.1.0"
description = "Gmail web application"
publisher = "Nimino"
homepage = "https://mail.google.com/"
categories = ["Network"]

[navigation]
allow = ["https://mail.google.com/**", "https://accounts.google.com/**", "https://*.googleusercontent.com/**", "https://*.google.com/**"]
external = ["https://support.google.com/**"]
